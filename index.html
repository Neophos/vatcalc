<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>VAT Calculator</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 24px;
    text-align: center;
    color: #e94560;
  }

  .card {
    background: #16213e;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 1rem;
    color: #aaa;
    font-weight: 600;
  }

  input[type="number"] {
    font-size: 1.8rem;
    padding: 14px 16px;
    border: 2px solid #0f3460;
    border-radius: 12px;
    background: #0f3460;
    color: #fff;
    width: 100%;
    -moz-appearance: textfield;
  }

  input[type="number"]:focus {
    outline: none;
    border-color: #e94560;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
  }

  .result-box {
    font-size: 1.8rem;
    padding: 14px 16px;
    border-radius: 12px;
    background: #0f3460;
    color: #fff;
    min-height: 56px;
    display: flex;
    align-items: center;
  }

  .pwd-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
  }

  .pwd-row input[type="checkbox"] {
    width: 32px;
    height: 32px;
    accent-color: #e94560;
    cursor: pointer;
    flex-shrink: 0;
  }

  .pwd-row label {
    font-size: 1.15rem;
    color: #eee;
    cursor: pointer;
  }

  .divider {
    border: none;
    border-top: 1px solid #0f3460;
  }

  .total-label {
    color: #e94560;
    font-size: 1.1rem;
  }

  .total-value {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e94560, #c23152);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .discount-note {
    font-size: 0.85rem;
    color: #aaa;
    text-align: center;
    margin-top: -12px;
  }
</style>
</head>
<body>

<h1>VAT Calculator</h1>

<div class="card">
  <div class="field">
    <label for="mealCost">Total Cost of Meal</label>
    <input type="number" id="mealCost" inputmode="decimal" placeholder="0.00" min="0" step="0.01">
  </div>

  <div class="field">
    <label>VAT (12%)</label>
    <div class="result-box" id="vatAmount">0.00</div>
  </div>

  <div class="field">
    <label>Cost Without VAT</label>
    <div class="result-box" id="costWithoutVat">0.00</div>
  </div>

  <hr class="divider">

  <div class="pwd-row">
    <input type="checkbox" id="pwdDiscount">
    <label for="pwdDiscount">PWD Discount (20% off)</label>
  </div>

  <div class="field">
    <label class="total-label">Final Amount Due</label>
    <div class="total-value" id="finalSum">0.00</div>
  </div>
  <div class="discount-note" id="discountNote"></div>
</div>

<script>
  const mealCostInput = document.getElementById('mealCost');
  const vatAmountEl = document.getElementById('vatAmount');
  const costWithoutVatEl = document.getElementById('costWithoutVat');
  const pwdCheckbox = document.getElementById('pwdDiscount');
  const finalSumEl = document.getElementById('finalSum');
  const discountNoteEl = document.getElementById('discountNote');

  function fmt(n) {
    return n.toFixed(2);
  }

  function calculate() {
    const total = parseFloat(mealCostInput.value) || 0;
    const vat = total * 0.12;
    const withoutVat = total - vat;

    vatAmountEl.textContent = fmt(vat);
    costWithoutVatEl.textContent = fmt(withoutVat);

    if (pwdCheckbox.checked) {
      const discount = total * 0.20;
      const final = total - discount;
      finalSumEl.textContent = fmt(final);
      discountNoteEl.textContent = 'Discount: -' + fmt(discount);
    } else {
      finalSumEl.textContent = fmt(total);
      discountNoteEl.textContent = '';
    }
  }

  mealCostInput.addEventListener('input', calculate);
  pwdCheckbox.addEventListener('change', calculate);

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
