<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="theme-color" content="#1a1a2e" />
        <title>VAT Calculator</title>
        <link rel="manifest" href="manifest.json" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #1a1a2e;
                color: #eee;
            }

            /* Page dots */
            .page-dots {
                display: flex;
                justify-content: center;
                gap: 8px;
                padding: 12px 0 4px;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 50;
                background: #1a1a2e;
            }

            .page-dots .dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: #0f3460;
                transition: background 0.2s;
            }

            .page-dots .dot.active {
                background: #e94560;
            }

            /* Swipe container */
            .pages-container {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
                height: 100%;
                scrollbar-width: none;
            }

            .pages-container::-webkit-scrollbar {
                display: none;
            }

            .page {
                min-width: 100vw;
                scroll-snap-align: start;
                overflow-y: auto;
                padding: 40px 16px 24px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            /* Shared styles */
            h1 {
                font-size: 1.6rem;
                margin-bottom: 16px;
                text-align: center;
                color: #e94560;
            }

            .card {
                background: #16213e;
                border-radius: 16px;
                padding: 24px;
                width: 100%;
                max-width: 480px;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .field {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            label {
                font-size: 1rem;
                color: #aaa;
                font-weight: 600;
            }

            input[type="number"] {
                font-size: 1.8rem;
                padding: 14px 16px;
                border: 2px solid #0f3460;
                border-radius: 12px;
                background: #0f3460;
                color: #fff;
                width: 100%;
                -moz-appearance: textfield;
            }

            input[type="number"]:focus {
                outline: none;
                border-color: #e94560;
            }

            input[type="number"]::-webkit-inner-spin-button,
            input[type="number"]::-webkit-outer-spin-button {
                -webkit-appearance: none;
            }

            .result-box {
                font-size: 1.8rem;
                padding: 14px 16px;
                border-radius: 12px;
                background: #0f3460;
                color: #fff;
                min-height: 56px;
                display: flex;
                align-items: center;
            }

            .pwd-row {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 10px 0;
            }

            .pwd-row input[type="checkbox"] {
                width: 32px;
                height: 32px;
                accent-color: #e94560;
                cursor: pointer;
                flex-shrink: 0;
            }

            .pwd-row label {
                font-size: 1.15rem;
                color: #eee;
                cursor: pointer;
            }

            .divider {
                border: none;
                border-top: 1px solid #0f3460;
            }

            .total-label {
                color: #e94560;
                font-size: 1.1rem;
            }

            .total-value {
                font-size: 2.2rem;
                font-weight: 700;
                background: linear-gradient(135deg, #e94560, #c23152);
                border-radius: 12px;
                padding: 16px;
                text-align: center;
            }

            .discount-note {
                font-size: 0.85rem;
                color: #aaa;
                text-align: center;
                margin-top: -12px;
            }

            /* Order summary */
            .order-summary {
                width: 100%;
                max-width: 480px;
                background: #16213e;
                border-radius: 16px;
                padding: 16px 24px;
                margin-bottom: 12px;
                display: none;
            }

            .order-summary.has-items {
                display: block;
            }

            .order-summary h2 {
                font-size: 1.1rem;
                color: #e94560;
                margin-bottom: 8px;
            }

            .order-summary ul {
                list-style: none;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .order-summary li {
                display: flex;
                justify-content: space-between;
                font-size: 1rem;
                color: #ccc;
            }

            .order-summary li .item-total {
                color: #fff;
                font-weight: 600;
            }

            /* Cash fund bar */
            .cash-fund-bar {
                width: 100%;
                max-width: 480px;
                background: #16213e;
                border-radius: 16px;
                padding: 18px 24px;
                margin-top: 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }

            .cash-fund-bar .fund-label {
                font-size: 1rem;
                color: #aaa;
                font-weight: 600;
            }

            .cash-fund-bar .fund-amount {
                font-size: 1.6rem;
                font-weight: 700;
                color: #4ecca3;
            }

            .btn-row {
                width: 100%;
                max-width: 480px;
                display: flex;
                gap: 12px;
                margin-top: 12px;
            }

            .btn {
                flex: 1;
                font-size: 1.1rem;
                font-weight: 700;
                padding: 16px 12px;
                border: none;
                border-radius: 12px;
                cursor: pointer;
                color: #fff;
            }

            .btn-cash {
                background: #4ecca3;
                color: #1a1a2e;
            }
            .btn-online {
                background: #5b8dee;
                color: #fff;
            }
            .btn-expense {
                background: #e9a045;
                color: #1a1a2e;
            }
            .btn-newday {
                background: #0f3460;
            }

            .history-toggle {
                width: 100%;
                max-width: 480px;
                margin-top: 20px;
                padding: 14px;
                background: #16213e;
                border-radius: 12px;
                text-align: center;
                font-size: 1.05rem;
                font-weight: 700;
                color: #aaa;
                cursor: pointer;
            }

            .history-panel {
                display: none;
                width: 100%;
                max-width: 480px;
                margin-top: 8px;
                background: #16213e;
                border-radius: 12px;
                padding: 16px 20px;
            }

            .history-panel.open {
                display: block;
            }

            .history-empty {
                text-align: center;
                color: #555;
                font-size: 0.95rem;
                padding: 8px 0;
            }

            .history-list {
                list-style: none;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .history-list li {
                background: #0f3460;
                border-radius: 10px;
                padding: 12px 14px;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .history-list .sale-header {
                display: flex;
                justify-content: space-between;
                font-weight: 700;
                font-size: 1rem;
            }

            .history-list .sale-method {
                font-size: 0.8rem;
                color: #aaa;
            }

            .history-list .sale-method.cash {
                color: #4ecca3;
            }
            .history-list .sale-method.online {
                color: #5b8dee;
            }

            .history-list .sale-items {
                font-size: 0.85rem;
                color: #888;
            }

            /* Modal */
            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.7);
                z-index: 100;
                align-items: center;
                justify-content: center;
                padding: 16px;
            }

            .modal-overlay.active {
                display: flex;
            }

            .modal {
                background: #16213e;
                border-radius: 16px;
                padding: 28px 24px;
                width: 100%;
                max-width: 420px;
                display: flex;
                flex-direction: column;
                gap: 18px;
            }

            .modal h2 {
                font-size: 1.4rem;
                color: #4ecca3;
                text-align: center;
            }

            .modal .result-box {
                font-size: 1.6rem;
            }

            .modal-btns {
                display: flex;
                gap: 12px;
                margin-top: 4px;
            }

            .modal-btns .btn {
                font-size: 1.05rem;
                padding: 14px;
            }

            .btn-confirm {
                background: #4ecca3;
                color: #1a1a2e;
            }
            .btn-cancel {
                background: #e94560;
            }

            .change-positive {
                color: #4ecca3;
            }
            .change-negative {
                color: #e94560;
            }

            /* Menu page */
            .menu-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                width: 100%;
                max-width: 480px;
            }

            .menu-item {
                background: #16213e;
                border: 2px solid #0f3460;
                border-radius: 16px;
                padding: 12px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 6px;
                min-height: 120px;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                touch-action: manipulation;
                transition:
                    border-color 0.15s,
                    transform 0.1s;
                position: relative;
            }

            .menu-item:active {
                transform: scale(0.96);
            }

            .menu-item.in-order {
                border-color: #4ecca3;
            }

            .menu-item .item-img {
                width: 56px;
                height: 56px;
                border-radius: 12px;
                object-fit: cover;
            }

            .menu-item .item-placeholder {
                width: 56px;
                height: 56px;
                border-radius: 12px;
                background: #0f3460;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.6rem;
                font-weight: 700;
                color: #e94560;
            }

            .menu-item .item-name {
                font-size: 1rem;
                font-weight: 700;
                color: #eee;
                text-align: center;
            }

            .menu-item .item-price {
                font-size: 0.9rem;
                color: #4ecca3;
                font-weight: 600;
            }

            .menu-item .item-badge {
                position: absolute;
                top: 8px;
                right: 8px;
                background: #e94560;
                color: #fff;
                font-size: 0.85rem;
                font-weight: 700;
                width: 26px;
                height: 26px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <div class="page-dots">
            <div class="dot active" data-page="0"></div>
            <div class="dot" data-page="1"></div>
        </div>

        <div class="pages-container" id="pagesContainer">
            <!-- Page 1: Calculator -->
            <div class="page" id="pageCalc">
                <h1>VAT Calculator</h1>

                <div class="order-summary" id="orderSummary">
                    <h2>Current Order</h2>
                    <ul id="orderList"></ul>
                </div>

                <div class="card">
                    <div class="field">
                        <label for="mealCost">Total Cost of Meal</label>
                        <input
                            type="number"
                            id="mealCost"
                            inputmode="decimal"
                            placeholder="0.00"
                            min="0"
                            step="0.01"
                        />
                    </div>

                    <div class="field">
                        <label>Less: VAT</label>
                        <div class="result-box" id="vatAmount">0.00</div>
                    </div>

                    <div class="field">
                        <label>Amount: Net of VAT</label>
                        <div class="result-box" id="costWithoutVat">0.00</div>
                    </div>

                    <hr class="divider" />

                    <div class="pwd-row">
                        <input type="checkbox" id="pwdDiscount" />
                        <label for="pwdDiscount">PWD Discount (20% off)</label>
                    </div>

                    <div class="field">
                        <label class="total-label">Final Amount Due</label>
                        <div class="total-value" id="finalSum">0.00</div>
                    </div>
                    <div class="discount-note" id="discountNote"></div>
                </div>

                <div class="cash-fund-bar">
                    <span class="fund-label">Cash Fund</span>
                    <span class="fund-amount" id="cashFund">4,000.00</span>
                </div>

                <div class="btn-row">
                    <button class="btn btn-cash" id="btnCashPay">
                        Cash Payment
                    </button>
                    <button class="btn btn-online" id="btnOnlinePay">
                        Online Payment
                    </button>
                </div>

                <div class="btn-row">
                    <button class="btn btn-expense" id="btnExpense">
                        Cash Expense
                    </button>
                    <button class="btn btn-newday" id="btnNewDay">
                        New Day
                    </button>
                </div>

                <div class="history-toggle" id="historyToggle">
                    Sales History
                </div>
                <div class="history-panel" id="historyPanel">
                    <div class="history-empty" id="historyEmpty">
                        No sales yet today.
                    </div>
                    <ul class="history-list" id="historyList"></ul>
                </div>
            </div>

            <!-- Page 2: Menu -->
            <div class="page" id="pageMenu">
                <h1>Food</h1>
                <div class="menu-grid" id="menuGridFood"></div>
                <h1 style="margin-top: 20px">Drinks</h1>
                <div class="menu-grid" id="menuGridDrinks"></div>
            </div>
        </div>

        <!-- Cash Payment Modal -->
        <div class="modal-overlay" id="cashModal">
            <div class="modal">
                <h2>Cash Payment</h2>
                <div class="field">
                    <label>Amount Due</label>
                    <div class="result-box" id="modalAmountDue">0.00</div>
                </div>
                <div class="field">
                    <label for="cashGiven">Cash Given by Customer</label>
                    <input
                        type="number"
                        id="cashGiven"
                        inputmode="decimal"
                        placeholder="0.00"
                        min="0"
                        step="0.01"
                    />
                </div>
                <div class="field">
                    <label>Change to Give Back</label>
                    <div class="result-box" id="changeAmount">0.00</div>
                </div>
                <div class="modal-btns">
                    <button class="btn btn-confirm" id="btnConfirmCash">
                        Confirm
                    </button>
                    <button class="btn btn-cancel" id="btnCancelCash">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <!-- Expense Modal -->
        <div class="modal-overlay" id="expenseModal">
            <div class="modal">
                <h2>Cash Expense</h2>
                <div class="field">
                    <label for="expenseAmount">Amount Spent</label>
                    <input
                        type="number"
                        id="expenseAmount"
                        inputmode="decimal"
                        placeholder="0.00"
                        min="0"
                        step="0.01"
                    />
                </div>
                <div class="modal-btns">
                    <button class="btn btn-confirm" id="btnConfirmExpense">
                        Confirm
                    </button>
                    <button class="btn btn-cancel" id="btnCancelExpense">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <script>
            // ---- Menu items (add image paths later) ----
            const MENU_ITEMS = [
                // Food
                { name: "Oh My BACON!", price: 175, category: "food" },
                { name: "Hungarian Sausage 1pc", price: 185, category: "food" },
                {
                    name: "Hungarian Sausage 2pcs",
                    price: 205,
                    category: "food",
                },
                { name: "Chicken Spam", price: 150, category: "food" },
                { name: "Homemade Longganisa", price: 175, category: "food" },
                {
                    name: "Old-Fashioned Pancakes",
                    price: 145,
                    category: "food",
                },
                { name: "Pancakes and Bacon", price: 165, category: "food" },
                { name: "Corned Beef", price: 155, category: "food" },
                {
                    name: "Cheeky Chicken Pops w/ Fries",
                    price: 155,
                    category: "food",
                },
                { name: "Chicken Wings (6s)", price: 230, category: "food" },
                { name: "Truffle Fries", price: 150, category: "food" },
                { name: "Coco Chicken Rice", price: 175, category: "food" },
                {
                    name: "3pc Chicken Wings w/ Rice",
                    price: 170,
                    category: "food",
                },
                { name: "Beef Lasagna", price: 150, category: "food" },
                { name: "Boss Burger", price: 295, category: "food" },
                { name: "Chicken Burger", price: 285, category: "food" },
                // Drinks
                { name: "Fizzy Drink", price: 110, category: "drink" },
                { name: "Milkshake", price: 160, category: "drink" },
                { name: "ICED Chocolate", price: 130, category: "drink" },
                { name: "Soda", price: 80, category: "drink" },
                { name: "Espresso", price: 80, category: "drink" },
                { name: "Americano HOT", price: 105, category: "drink" },
                { name: "Americano ICED", price: 110, category: "drink" },
                { name: "Spanish Latte HOT", price: 120, category: "drink" },
                { name: "Spanish Latte ICED", price: 130, category: "drink" },
                { name: "Cafe Latte HOT", price: 110, category: "drink" },
                { name: "Cafe Latte ICED", price: 120, category: "drink" },
                {
                    name: "Caramel Macchiato HOT",
                    price: 145,
                    category: "drink",
                },
                {
                    name: "Caramel Macchiato ICED",
                    price: 155,
                    category: "drink",
                },
                { name: "Mocha Latte HOT", price: 130, category: "drink" },
                { name: "Mocha Latte ICED", price: 140, category: "drink" },
                { name: "Cappuccino HOT", price: 110, category: "drink" },
                { name: "Cappuccino ICED", price: 120, category: "drink" },
                {
                    name: "Irish Cream Latte HOT",
                    price: 155,
                    category: "drink",
                },
                {
                    name: "Irish Cream Latte ICED",
                    price: 165,
                    category: "drink",
                },
                { name: "Salt Latte HOT", price: 155, category: "drink" },
                { name: "Salt Latte ICED", price: 165, category: "drink" },
                {
                    name: "Coconut Shaken Coffee HOT",
                    price: 155,
                    category: "drink",
                },
                {
                    name: "Coconut Shaken Coffee ICED",
                    price: 165,
                    category: "drink",
                },
            ];

            // ---- Order state ----
            const order = {};

            // ---- DOM refs ----
            const mealCostInput = document.getElementById("mealCost");
            const vatAmountEl = document.getElementById("vatAmount");
            const costWithoutVatEl = document.getElementById("costWithoutVat");
            const pwdCheckbox = document.getElementById("pwdDiscount");
            const finalSumEl = document.getElementById("finalSum");
            const discountNoteEl = document.getElementById("discountNote");
            const orderSummaryEl = document.getElementById("orderSummary");
            const orderListEl = document.getElementById("orderList");
            const menuGridFood = document.getElementById("menuGridFood");
            const menuGridDrinks = document.getElementById("menuGridDrinks");

            function fmt(n) {
                return n.toFixed(2);
            }

            // ---- VAT calculation ----
            function calculate() {
                const total = parseFloat(mealCostInput.value) || 0;
                const withoutVat = total / 1.12;
                const vat = total - withoutVat;

                vatAmountEl.textContent = fmt(vat);
                costWithoutVatEl.textContent = fmt(withoutVat);

                if (pwdCheckbox.checked) {
                    const discount = total * 0.2;
                    finalSumEl.textContent = fmt(total - discount);
                    discountNoteEl.textContent = "Discount: -" + fmt(discount);
                } else {
                    finalSumEl.textContent = fmt(total);
                    discountNoteEl.textContent = "";
                }
            }

            mealCostInput.addEventListener("input", calculate);
            pwdCheckbox.addEventListener("change", calculate);

            // ---- Order logic ----
            function getOrderTotal() {
                let sum = 0;
                for (const name in order) {
                    const item = MENU_ITEMS.find((i) => i.name === name);
                    if (item) sum += item.price * order[name];
                }
                return sum;
            }

            function updateOrderUI() {
                // Update summary
                const keys = Object.keys(order).filter((k) => order[k] > 0);
                if (keys.length === 0) {
                    orderSummaryEl.classList.remove("has-items");
                    orderListEl.innerHTML = "";
                } else {
                    orderSummaryEl.classList.add("has-items");
                    orderListEl.innerHTML = keys
                        .map((name) => {
                            const item = MENU_ITEMS.find(
                                (i) => i.name === name,
                            );
                            const qty = order[name];
                            return (
                                "<li><span>" +
                                qty +
                                "x " +
                                name +
                                '</span><span class="item-total">' +
                                fmt(item.price * qty) +
                                "</span></li>"
                            );
                        })
                        .join("");
                }

                // Update meal cost input and recalculate
                const total = getOrderTotal();
                mealCostInput.value = total > 0 ? fmt(total) : "";
                calculate();

                // Update menu button badges
                renderMenuGrid();
            }

            function clearOrder() {
                for (const key in order) delete order[key];
                updateOrderUI();
                pwdCheckbox.checked = false;
            }

            // ---- Menu grid ----
            function renderItemsInGrid(grid, items) {
                grid.innerHTML = items
                    .map(function (item) {
                        const qty = order[item.name] || 0;
                        const hasOrder = qty > 0;
                        const imgHtml = item.image
                            ? '<img class="item-img" src="' +
                              item.image +
                              '" alt="' +
                              item.name +
                              '">'
                            : '<div class="item-placeholder">' +
                              item.name.charAt(0) +
                              "</div>";
                        const badge = hasOrder
                            ? '<div class="item-badge">' + qty + "</div>"
                            : "";
                        return (
                            '<div class="menu-item' +
                            (hasOrder ? " in-order" : "") +
                            '" data-name="' +
                            item.name +
                            '">' +
                            badge +
                            imgHtml +
                            '<div class="item-name">' +
                            item.name +
                            "</div>" +
                            '<div class="item-price">' +
                            fmt(item.price) +
                            "</div>" +
                            "</div>"
                        );
                    })
                    .join("");

                grid.querySelectorAll(".menu-item").forEach(function (el) {
                    let pressTimer = null;
                    let didLongPress = false;

                    el.addEventListener("pointerdown", function () {
                        didLongPress = false;
                        pressTimer = setTimeout(function () {
                            didLongPress = true;
                            delete order[el.dataset.name];
                            updateOrderUI();
                        }, 500);
                    });

                    el.addEventListener("pointerup", function () {
                        clearTimeout(pressTimer);
                        if (!didLongPress) {
                            order[el.dataset.name] =
                                (order[el.dataset.name] || 0) + 1;
                            updateOrderUI();
                        }
                    });

                    el.addEventListener("pointerleave", function () {
                        clearTimeout(pressTimer);
                    });

                    el.addEventListener("contextmenu", function (e) {
                        e.preventDefault();
                    });
                });
            }

            function renderMenuGrid() {
                renderItemsInGrid(
                    menuGridFood,
                    MENU_ITEMS.filter(function (i) {
                        return i.category === "food";
                    }),
                );
                renderItemsInGrid(
                    menuGridDrinks,
                    MENU_ITEMS.filter(function (i) {
                        return i.category === "drink";
                    }),
                );
            }

            renderMenuGrid();

            // ---- Page dots / swipe indicator ----
            const pagesContainer = document.getElementById("pagesContainer");
            const dots = document.querySelectorAll(".page-dots .dot");

            pagesContainer.addEventListener("scroll", function () {
                const scrollLeft = pagesContainer.scrollLeft;
                const pageWidth = pagesContainer.offsetWidth;
                const pageIndex = Math.round(scrollLeft / pageWidth);
                dots.forEach((d, i) =>
                    d.classList.toggle("active", i === pageIndex),
                );
            });

            // ---- Sales history ----
            let salesHistory = JSON.parse(
                localStorage.getItem("salesHistory") || "[]",
            );
            const historyToggle = document.getElementById("historyToggle");
            const historyPanel = document.getElementById("historyPanel");
            const historyEmpty = document.getElementById("historyEmpty");
            const historyList = document.getElementById("historyList");

            function addSale(method) {
                const amount = getAmountDue();
                if (amount <= 0) return;
                const keys = Object.keys(order).filter((k) => order[k] > 0);
                const items =
                    keys.map((k) => order[k] + "x " + k).join(", ") ||
                    "Manual entry";
                const time = new Date().toLocaleTimeString("en", {
                    hour: "2-digit",
                    minute: "2-digit",
                });
                salesHistory.unshift({
                    time: time,
                    amount: amount,
                    method: method,
                    items: items,
                });
                localStorage.setItem(
                    "salesHistory",
                    JSON.stringify(salesHistory),
                );
                renderHistory();
            }

            function renderHistory() {
                if (salesHistory.length === 0) {
                    historyEmpty.style.display = "";
                    historyList.innerHTML = "";
                } else {
                    historyEmpty.style.display = "none";
                    historyList.innerHTML = salesHistory
                        .map(function (s) {
                            return (
                                "<li>" +
                                '<div class="sale-header"><span>' +
                                s.time +
                                "</span><span>" +
                                fmt(s.amount) +
                                "</span></div>" +
                                '<div class="sale-method ' +
                                s.method +
                                '">' +
                                (s.method === "cash" ? "Cash" : "Online") +
                                "</div>" +
                                '<div class="sale-items">' +
                                s.items +
                                "</div>" +
                                "</li>"
                            );
                        })
                        .join("");
                }
            }

            historyToggle.addEventListener("click", function () {
                historyPanel.classList.toggle("open");
                historyToggle.textContent = historyPanel.classList.contains(
                    "open",
                )
                    ? "Hide Sales History"
                    : "Sales History";
            });

            renderHistory();

            // ---- Online payment ----
            const btnOnlinePay = document.getElementById("btnOnlinePay");

            btnOnlinePay.addEventListener("click", function () {
                const due = getAmountDue();
                if (due <= 0) return;
                addSale("online");
                clearOrder();
            });

            // ---- Cash fund ----
            const STARTING_FUND = 4000;
            let cashFund =
                parseFloat(localStorage.getItem("cashFund")) || STARTING_FUND;

            const cashFundEl = document.getElementById("cashFund");
            const cashModal = document.getElementById("cashModal");
            const modalAmountDue = document.getElementById("modalAmountDue");
            const cashGivenInput = document.getElementById("cashGiven");
            const changeAmountEl = document.getElementById("changeAmount");
            const btnCashPay = document.getElementById("btnCashPay");
            const btnNewDay = document.getElementById("btnNewDay");
            const btnConfirmCash = document.getElementById("btnConfirmCash");
            const btnCancelCash = document.getElementById("btnCancelCash");

            function fmtFund(n) {
                return n.toLocaleString("en", {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2,
                });
            }

            function updateFundDisplay() {
                cashFundEl.textContent = fmtFund(cashFund);
                localStorage.setItem("cashFund", cashFund);
            }

            function getAmountDue() {
                return parseFloat(finalSumEl.textContent) || 0;
            }

            function updateChange() {
                const given = parseFloat(cashGivenInput.value) || 0;
                const due = getAmountDue();
                const change = given - due;
                changeAmountEl.textContent = fmt(change);
                changeAmountEl.className =
                    "result-box " +
                    (change >= 0 ? "change-positive" : "change-negative");
            }

            btnCashPay.addEventListener("click", function () {
                modalAmountDue.textContent = finalSumEl.textContent;
                cashGivenInput.value = "";
                changeAmountEl.textContent = "0.00";
                changeAmountEl.className = "result-box";
                cashModal.classList.add("active");
                cashGivenInput.focus();
            });

            cashGivenInput.addEventListener("input", updateChange);

            btnConfirmCash.addEventListener("click", function () {
                const given = parseFloat(cashGivenInput.value) || 0;
                const due = getAmountDue();
                const change = given - due;
                cashFund = cashFund + given - change;
                updateFundDisplay();
                cashModal.classList.remove("active");
                addSale("cash");
                clearOrder();
            });

            btnCancelCash.addEventListener("click", function () {
                cashModal.classList.remove("active");
            });

            btnNewDay.addEventListener("click", function () {
                if (
                    confirm(
                        "Start a new day? This will reset the cash fund to " +
                            fmtFund(STARTING_FUND) +
                            ".",
                    )
                ) {
                    cashFund = STARTING_FUND;
                    updateFundDisplay();
                    salesHistory = [];
                    localStorage.setItem("salesHistory", "[]");
                    renderHistory();
                }
            });

            // ---- Cash expense ----
            const expenseModal = document.getElementById("expenseModal");
            const expenseAmountInput = document.getElementById("expenseAmount");
            const btnExpense = document.getElementById("btnExpense");
            const btnConfirmExpense =
                document.getElementById("btnConfirmExpense");
            const btnCancelExpense =
                document.getElementById("btnCancelExpense");

            btnExpense.addEventListener("click", function () {
                expenseAmountInput.value = "";
                expenseModal.classList.add("active");
                expenseAmountInput.focus();
            });

            btnConfirmExpense.addEventListener("click", function () {
                const amount = parseFloat(expenseAmountInput.value) || 0;
                cashFund = cashFund - amount;
                updateFundDisplay();
                expenseModal.classList.remove("active");
            });

            btnCancelExpense.addEventListener("click", function () {
                expenseModal.classList.remove("active");
            });

            updateFundDisplay();

            // ---- Service worker ----
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("sw.js");
            }
        </script>
    </body>
</html>
